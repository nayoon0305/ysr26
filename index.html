<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-adsense-account" content="ca-pub-1028421747919023">
    <title>봄꽃 인생샷 제작소</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1028421747919023"
     crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌸 봄꽃 인생샷 제작소 🌸</h1>
            <p>한국의 아름다운 봄꽃을 배경으로 인생샷을 만들어보세요.</p>
        </header>

        <main>
            <!-- Top Ad Unit -->
            <div class="ad-container" style="margin-bottom: 20px; text-align: center;">
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-1028421747919023"
                     data-ad-slot="YOUR_AD_SLOT_1"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
                <script>
                     (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
            </div>

            <section class="flower-selection">
                <h2>1. 배경 꽃 선택하기</h2>
                <div class="flower-grid">
                    <div class="flower-item active" data-flower="cherry" data-bg="https://images.unsplash.com/photo-1522383225653-ed111181a951?auto=format&fit=crop&w=1200&q=80">
                        <div class="flower-thumb" style="background-image: url('https://images.unsplash.com/photo-1522383225653-ed111181a951?auto=format&fit=crop&w=200&q=80')"></div>
                        <span>벚꽃</span>
                    </div>
                    <div class="flower-item" data-flower="forsythia" data-bg="https://images.unsplash.com/photo-1554631221-f9603e6808be?auto=format&fit=crop&w=1200&q=80">
                        <div class="flower-thumb" style="background-image: url('https://images.unsplash.com/photo-1554631221-f9603e6808be?auto=format&fit=crop&w=200&q=80')"></div>
                        <span>개나리</span>
                    </div>
                    <div class="flower-item" data-flower="azalea" data-bg="https://images.unsplash.com/photo-1599424423956-618d3509657b?auto=format&fit=crop&w=1200&q=80">
                        <div class="flower-thumb" style="background-image: url('https://images.unsplash.com/photo-1599424423956-618d3509657b?auto=format&fit=crop&w=200&q=80')"></div>
                        <span>진달래</span>
                    </div>
                    <div class="flower-item" data-flower="canola" data-bg="https://images.unsplash.com/photo-1501196354995-cbb51c65aaea?auto=format&fit=crop&w=1200&q=80">
                        <div class="flower-thumb" style="background-image: url('https://images.unsplash.com/photo-1501196354995-cbb51c65aaea?auto=format&fit=crop&w=200&q=80')"></div>
                        <span>유채꽃</span>
                    </div>
                    <div class="flower-item" data-flower="apricot" data-bg="https://images.unsplash.com/photo-1521495084171-3ad639e3d525?auto=format&fit=crop&w=1200&q=80">
                        <div class="flower-thumb" style="background-image: url('https://images.unsplash.com/photo-1521495084171-3ad639e3d525?auto=format&fit=crop&w=200&q=80')"></div>
                        <span>매화</span>
                    </div>
                </div>
            </section>

            <section class="photo-upload">
                <h2>2. 인물 사진 올리기</h2>
                <div class="upload-area" id="upload-area">
                    <input type="file" id="file-input" accept="image/*" hidden>
                    <label for="file-input" class="upload-btn">사진 선택하기</label>
                    <p class="hint">정면 사진을 추천합니다.</p>
                </div>
            </section>

            <section class="preview-section">
                <h2>3. 미리보기 및 저장</h2>
                <div id="capture-area" class="capture-area">
                    <div id="flower-bg" class="flower-bg" style="background-image: url('https://images.unsplash.com/photo-1522383225653-ed111181a951?auto=format&fit=crop&w=1200&q=80')">
                        <div id="portrait-container" class="portrait-container">
                            <img id="portrait-img" src="" alt="" style="display: none;">
                            <div id="placeholder-text">사진을 업로드해주세요</div>
                        </div>
                    </div>
                </div>
                <button id="download-btn" class="download-btn" disabled>이미지 저장하기</button>
            </section>

            <!-- Bottom Ad Unit -->
            <div class="ad-container" style="margin-top: 40px; text-align: center;">
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-1028421747919023"
                     data-ad-slot="YOUR_AD_SLOT_2"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
                <script>
                     (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 봄꽃 인생샷 제작소. All rights reserved.</p>
        </footer>
    </div>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
