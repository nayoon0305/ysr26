<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-adsense-account" content="ca-pub-1028421747919023">
    <title>가위바위보 게임</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1028421747919023"
     crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="top-controls">
            <button id="lang-toggle" aria-label="Toggle language">KR/EN</button>
            <button id="theme-toggle" aria-label="Toggle dark mode">🌞</button>
        </div>
        <h1 data-i18n="title">가위바위보 게임</h1>
        
        <div class="game-section">
            <div class="game-display">
                <div class="player-side">
                    <p data-i18n="user_label">나 (User)</p>
                    <div id="webcam-container"></div>
                </div>
                <div class="vs">VS</div>
                <div class="computer-side">
                    <p data-i18n="computer_label">컴퓨터 (CPU)</p>
                    <div id="computer-choice">🤖</div>
                </div>
            </div>
            
            <div id="result-message" data-i18n="start_msg">"Start"를 눌러 게임을 시작하세요!</div>
            <button id="start-btn" onclick="init()" data-i18n="start_btn">게임 시작 (Start)</button>
            <div id="label-container" style="display:none;"></div>
        </div>

        <!-- Google AdSense Responsive Ad -->
        <div style="margin: 20px 0; text-align: center;">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-1028421747919023"
                 data-ad-slot="YOUR_AD_SLOT_HERE"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>

        <div class="partnership-section">
            <hr>
            <h2 data-i18n="partnership_title">제휴 문의</h2>
            <form action="https://formspree.io/f/mykbawkz" method="POST" id="partnership-form">
                <div class="form-group">
                    <input type="text" name="name" data-i18n-placeholder="placeholder_name" placeholder="성함/업체명" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" data-i18n-placeholder="placeholder_email" placeholder="이메일 주소" required>
                </div>
                <div class="form-group">
                    <textarea name="message" data-i18n-placeholder="placeholder_message" placeholder="문의 내용" required></textarea>
                </div>
                <button type="submit" class="submit-btn" data-i18n="submit_btn">문의하기</button>
            </form>
        </div>

        <div class="disqus-section">
            <hr>
            <div id="disqus_thread"></div>
        </div>
    </div>
    <script>
        var disqus_config = function () {
            this.page.url = window.location.href;
            this.page.identifier = window.location.pathname;
        };
        (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://ysr26.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
    <script src="main.js"></script>
</body>
</html>
