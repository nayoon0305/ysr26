<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinner Menu Recommendation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="top-controls">
            <button id="lang-toggle" aria-label="Toggle language">KR/EN</button>
            <button id="theme-toggle" aria-label="Toggle dark mode">🌞</button>
        </div>
        <h1 data-i18n="title">오늘의 저녁 메뉴 추천</h1>
        <div class="menu-display"></div>
        <button id="recommend-btn" data-i18n="recommend_btn">메뉴 추천받기</button>

        <div class="partnership-section">
            <hr>
            <h2 data-i18n="partnership_title">제휴 문의</h2>
            <form action="https://formspree.io/f/mykbawkz" method="POST" id="partnership-form">
                <div class="form-group">
                    <input type="text" name="name" data-i18n-placeholder="placeholder_name" placeholder="성함/업체명" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" data-i18n-placeholder="placeholder_email" placeholder="이메일 주소" required>
                </div>
                <div class="form-group">
                    <textarea name="message" data-i18n-placeholder="placeholder_message" placeholder="문의 내용" required></textarea>
                </div>
                <button type="submit" class="submit-btn" data-i18n="submit_btn">문의하기</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
