<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinner Menu Recommendation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" aria-label="Toggle dark mode">🌞</button>
        <h1>Dinner Menu Recommendation</h1>
        <div class="menu-display"></div>
        <button id="recommend-btn">Recommend Dinner</button>

        <div class="partnership-section">
            <hr>
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/mykbawkz" method="POST" id="partnership-form">
                <div class="form-group">
                    <input type="text" name="name" placeholder="성함/업체명" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="이메일 주소" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="문의 내용" required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의하기</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
